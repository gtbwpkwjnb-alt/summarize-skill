# sutras.yaml — summarize skill metadata & configuration
# https://agentskills.io

name: summarize
version: "3.0.1"
description: |
  Use when sessions exceed 20 rounds, errors accumulate (≥3), or progress
  needs cross-project archiving. Tracks errors with backtest verification
  against established behavioral rules. Triggered by /总结.

author: ZCode (https://github.com/gtbwpkwjnb-alt)
license: MIT
repository: https://github.com/gtbwpkwjnb-alt/summarize-skill

compatibility:
  platforms: [zcode, claude-code, cursor, codex, windsurf]
  minVersion: "2.0.0"

build:
  include:
    - SKILL.md
    - README.md
    - LICENSE
    - VERSION
    - RULES.md
    - install.sh
    - install.ps1
    - references/
    - harvests/

distribution:
  tags:
    - diagnostics
    - error-tracking
    - session-management
    - self-evolution
    - productivity
  category: developer-tools
  github:
    owner: gtbwpkwjnb-alt
    repo: summarize-skill
  install:
    bash: "curl -sL https://raw.githubusercontent.com/gtbwpkwjnb-alt/summarize-skill/master/install.sh | bash"
    powershell: "iwr https://raw.githubusercontent.com/gtbwpkwjnb-alt/summarize-skill/master/install.ps1 | iex"
